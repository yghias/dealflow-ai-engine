name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: ruff check src
      - run: pytest
      - run: test -f sql/schema.sql
      - run: test -f sql/marts.sql
      - run: test -f sql/tests.sql
