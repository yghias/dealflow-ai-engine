version: 2

models:
  - name: stg_signal_event
    columns:
      - name: source_record_id
        tests: [not_null, unique]
      - name: signal_type
        tests:
          - accepted_values:
              values: ['funding', 'expansion', 'leadership_change', 'partnership', 'product_launch']
  - name: int_signal_scores
    columns:
      - name: overall_score
        tests: [not_null]
  - name: mart_ranked_signal_queue
    columns:
      - name: signal_id
        tests: [not_null, unique]
      - name: queue_tier
        tests:
          - accepted_values:
              values: ['priority_1', 'priority_2', 'priority_3']
